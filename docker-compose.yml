services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - local_storage:/app/storage
    depends_on:
      - postgres
      - qdrant

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hiremind
      POSTGRES_USER: hiremind
      POSTGRES_PASSWORD: hiremind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
  local_storage:

